<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Bánh Canh Gà Hàng Gòn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f6e7cc;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
    }

    .order-404 {
      width: 100vw;
      min-height: 100vh;
      min-height: 100svh;
      background-image: url('images/order/404.png');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center center;
    }

    @media (max-width: 768px) {
      .order-404 {
        background-position: center center;
      }
    }
  </style>
</head>

<body>
  <main class="order-404" aria-label="Trang đặt hàng chưa sẵn sàng"></main>
</body>

</html>
