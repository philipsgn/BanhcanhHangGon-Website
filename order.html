<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng - Bánh Canh Gà Hàng Gòn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-deep: #241610;
      --cream: #f2e8d5;
      --cream-dim: #c9bda4;
      --gold: #c99a4a;
      --line: rgba(242, 232, 213, 0.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(20, 10, 6, 0.62), rgba(20, 10, 6, 0.94)),
        url('images/home/background.png') center center / cover no-repeat,
        var(--bg-deep);
      color: var(--cream);
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .order-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px clamp(20px, 5vw, 64px) 42px;
    }

    .order-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      width: 76px;
      height: 76px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(201,154,74,0.36));
    }

    .back-link {
      color: var(--cream-dim);
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .25s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--gold);
    }

    .order-main {
      width: min(100%, 760px);
      margin: auto 0;
      padding: clamp(56px, 8vw, 96px) 0;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .32em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 104px);
      line-height: .92;
      font-weight: 500;
      max-width: 620px;
    }

    .intro {
      max-width: 520px;
      margin-top: 24px;
      color: rgba(242,232,213,0.82);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.7;
      font-weight: 300;
    }

    .order-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 220px));
      gap: 12px;
      margin-top: 34px;
    }

    .order-btn {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border: 1px solid rgba(201,154,74,0.58);
      border-radius: 999px;
      background: rgba(36, 22, 16, 0.48);
      color: var(--cream);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: .16em;
      text-transform: uppercase;
      transition: transform .22s ease, background .22s ease, border-color .22s ease;
    }

    .order-btn:hover,
    .order-btn:focus-visible {
      transform: translateY(-2px);
      background: rgba(201,154,74,0.16);
      border-color: var(--gold);
    }

    .order-note {
      margin-top: 18px;
      color: rgba(201,189,164,0.76);
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 640px) {
      .order-page {
        padding: 20px 22px 34px;
      }

      .logo {
        width: 64px;
        height: 64px;
      }

      .back-link {
        font-size: 13px;
      }

      .order-main {
        padding: 70px 0 40px;
      }

      .order-actions {
        grid-template-columns: 1fr;
        max-width: 320px;
      }
    }
  </style>
</head>

<body>
  <div class="order-page">
    <nav class="order-nav" aria-label="Điều hướng đặt hàng">
      <a class="logo" href="index.html#hero" aria-label="Bánh Canh Gà Hàng Gòn">
        <img src="images/menu/icon-quan-an.png" alt="Bánh Canh Gà Hàng Gòn">
      </a>
      <a class="back-link" href="index.html#menu">Xem menu</a>
    </nav>

    <main class="order-main">
      <p class="eyebrow">Đặt hàng</p>
      <h1>Bánh canh nóng, giao liền tay.</h1>
      <p class="intro">Chọn kênh đặt hàng phù hợp hoặc nhắn trực tiếp cho quán để được hỗ trợ món còn trong ngày.</p>

      <div class="order-actions" aria-label="Kênh đặt hàng">
        <a class="order-btn" href="#" aria-label="Đặt qua ShopeeFood">ShopeeFood</a>
        <a class="order-btn" href="#" aria-label="Đặt qua GrabFood">GrabFood</a>
        <a class="order-btn" href="https://www.facebook.com/Banhcanhgahanggon" target="_blank" rel="noopener">Facebook</a>
        <a class="order-btn" href="https://www.tiktok.com/@banhcanhgahanggon?lang=en" target="_blank" rel="noopener">TikTok</a>
      </div>

      <p class="order-note">Link ShopeeFood và GrabFood đang chờ URL chính thức của quán.</p>
    </main>
  </div>
</body>

</html>
